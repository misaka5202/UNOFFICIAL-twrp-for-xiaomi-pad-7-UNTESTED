name: Build TWRP for Xiaomi Pad 7 (uke)

on:
  workflow_dispatch:
    inputs:
      MANIFEST_BRANCH:
        description: 'TWRP Manifest Branch'
        required: true
        default: 'twrp-12.1'
        type: choice
        options:
          - twrp-12.1

jobs:
  build:
    name: Build TWRP
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:

      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device_tree

      - name: Set up build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git-core gnupg flex bison build-essential zip curl \
            zlib1g-dev libc6-dev-i386 libncurses-dev lib32ncurses-dev \
            x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
            libxml2-utils xsltproc unzip fontconfig python3 python-is-python3 \
            libssl-dev bc lzop kmod cpio rsync ccache

      - name: Set up repo tool
        run: |
          mkdir -p ~/.bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/.bin/repo
          chmod a+x ~/.bin/repo
          echo "$HOME/.bin" >> $GITHUB_PATH

      - name: Configure git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Download prebuilts FIRST (before sync)
        run: |
          mkdir -p device_tree/prebuilt
          cd device_tree/prebuilt

          BASE="https://sourceforge.net/projects/irawansprojekt/files/uke/Android%2016/LineageOS/22%20October%202025"

          echo "Downloading dtbo.img (will use as dtb.img)..."
          curl -L "$BASE/dtbo.img/download" -o dtb.img --max-time 300 --retry 3
          DTB_SIZE=$(stat -c%s dtb.img 2>/dev/null || echo 0)
          echo "dtb.img size: $DTB_SIZE bytes"
          if [ "$DTB_SIZE" -lt 1000 ]; then
            echo "ERROR: dtb.img download failed or too small!"
            exit 1
          fi

          echo "Downloading boot.img for kernel..."
          curl -L "$BASE/boot.img/download" -o boot.img --max-time 300 --retry 3
          BOOT_SIZE=$(stat -c%s boot.img 2>/dev/null || echo 0)
          echo "boot.img size: $BOOT_SIZE bytes"

          if [ "$BOOT_SIZE" -gt 1000000 ]; then
            python3 - <<'PYEOF'
          import struct, os, sys
          with open('boot.img', 'rb') as f:
              data = f.read()
          kernel_size = struct.unpack_from('<I', data, 8)[0]
          header_size = struct.unpack_from('<I', data, 20)[0]
          page_size = 4096
          kernel_offset = ((header_size + page_size - 1) // page_size) * page_size
          print(f"Kernel size: {kernel_size}, offset: {kernel_offset}")
          if kernel_size > 0:
              with open('kernel', 'wb') as f:
                  f.write(data[kernel_offset:kernel_offset + kernel_size])
              print(f"Kernel extracted: {kernel_size} bytes")
          else:
              print("Kernel size 0, skipping")
          PYEOF
          fi

          rm -f boot.img
          echo "=== Prebuilt contents ==="
          ls -lh

      - name: Initialize TWRP manifest
        run: |
          mkdir -p twrp
          cd twrp
          repo init --depth=1 \
            -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git \
            -b ${{ github.event.inputs.MANIFEST_BRANCH }}
          repo sync -j$(nproc) --no-clone-bundle --no-tags --force-sync

      - name: Copy device tree
        run: |
          mkdir -p twrp/device/xiaomi/uke
          cp -r device_tree/* twrp/device/xiaomi/uke/
          echo "=== Verifying prebuilts in build tree ==="
          ls -lh twrp/device/xiaomi/uke/prebuilt/

      - name: Build TWRP vendor_boot
        run: |
          cd twrp
          export ALLOW_MISSING_DEPENDENCIES=true
          export BUILD_BROKEN_ELF_PREBUILT_PRODUCT_COPY_FILES=true
          . build/envsetup.sh
          lunch twrp_uke-eng
          mka vendorbootimage 2>&1 | tee build.log
          echo "Build exit code: $?"

      - name: Check output
        run: |
          echo "=== All images ==="
          find twrp/out/target/product/uke/ -name "*.img" -ls 2>/dev/null || echo "No images found"

      - name: Upload vendor_boot.img
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-vendor_boot-uke
          path: twrp/out/target/product/uke/vendor_boot.img
          if-no-files-found: warn

      - name: Upload all images (backup)
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-all-images-uke
          path: twrp/out/target/product/uke/*.img
          if-no-files-found: warn

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: twrp/build.log
